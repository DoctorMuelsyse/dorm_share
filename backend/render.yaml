services:
  - type: web
    name: dorm-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PORT
        value: 5000
      - key: DB_HOST
        value: localhost
      - key: DB_USER
        value: root
      - key: DB_PASSWORD
        value: 123456
      - key: DB_NAME
        value: dorm_share
      - key: PYTHON_VERSION
        value: 3.10.0
