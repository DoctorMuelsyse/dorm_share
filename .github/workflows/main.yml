name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          cd backend
          pip install flask flask-cors pymysql

      - name: Check Python syntax
        run: |
          python -m py_compile backend/app.py
          python -m py_compile backend/db_config.py

      - name: Check frontend files exist
        run: |
          for f in login.html dashboard.html profile.html my-items.html my-orders.html favorites.html admin-orders.html admin-users.html; do
            test -f "frontend/$f" && echo "✓ $f exists" || echo "✗ $f missing"
          done
