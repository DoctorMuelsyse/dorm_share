<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录 - 宿舍好物共享系统</title>
    <script src="config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 400px;
            padding: 40px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .tab {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }
        .tab-btn {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 16px;
            color: #666;
        }
        .tab-btn.active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
            margin-bottom: -2px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        .btn:hover {
            background: #5a67d8;
        }
        .message {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
        }
        .error {
            color: red;
        }
        .success {
            color: green;
        }
        .form-panel {
            display: none;
        }
        .form-panel.active {
            display: block;
        }
        .demo-accounts {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #999;
        }
        .demo-accounts p {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>宿舍好物共享租借系统</h2>
        
        <div class="tab">
            <button class="tab-btn active" onclick="switchTab('login')">登录</button>
            <button class="tab-btn" onclick="switchTab('register')">注册</button>
        </div>

        <!-- 登录表单 -->
        <div id="loginPanel" class="form-panel active">
            <form id="loginForm">
                <div class="form-group">
                    <label>学号</label>
                    <input type="text" id="loginUserId" placeholder="请输入学号" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn">登录</button>
                <div id="loginMessage" class="message"></div>
            </form>
        </div>

        <!-- 注册表单 -->
        <div id="registerPanel" class="form-panel">
            <form id="registerForm">
                <div class="form-group">
                    <label>学号</label>
                    <input type="text" id="regUserId" placeholder="请输入学号" required>
                </div>
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" id="regName" placeholder="请输入姓名" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="regPassword" placeholder="请输入密码" required>
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" id="regConfirmPassword" placeholder="请再次输入密码" required>
                </div>
                <div class="form-group">
                    <label>宿舍楼</label>
                    <input type="text" id="regDormBuilding" placeholder="如：1号楼" required>
                </div>
                <div class="form-group">
                    <label>房间号</label>
                    <input type="text" id="regDormRoom" placeholder="如：101" required>
                </div>
                <div class="form-group">
                    <label>电话</label>
                    <input type="tel" id="regPhone" placeholder="联系电话" required>
                </div>
                <button type="submit" class="btn">注册</button>
                <div id="registerMessage" class="message"></div>
            </form>
        </div>

        <!-- 测试账号提示 -->
        <div class="demo-accounts">
            <p><strong>测试账号：</strong></p>
            <p>学生：学号 2021001 / 密码 123456</p>
            <p>管理员：学号 admin / 密码 admin123</p>
        </div>
    </div>

    <script>
        // 切换登录/注册面板
        function switchTab(tab) {
            const loginPanel = document.getElementById('loginPanel');
            const registerPanel = document.getElementById('registerPanel');
            const tabBtns = document.querySelectorAll('.tab-btn');
            
            if (tab === 'login') {
                loginPanel.classList.add('active');
                registerPanel.classList.remove('active');
                tabBtns[0].classList.add('active');
                tabBtns[1].classList.remove('active');
            } else {
                loginPanel.classList.remove('active');
                registerPanel.classList.add('active');
                tabBtns[0].classList.remove('active');
                tabBtns[1].classList.add('active');
            }
        }

        // 登录处理
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const userId = document.getElementById('loginUserId').value;
            const password = document.getElementById('loginPassword').value;
            const messageDiv = document.getElementById('loginMessage');
            
            // 清空之前的消息
            messageDiv.innerHTML = '';
            
            try {
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, password: password })
                });
                
                const result = await response.json();
                
                if (result.code === 200) {
                    // 保存用户信息到本地存储
                    localStorage.setItem('user', JSON.stringify(result.data));
                    messageDiv.innerHTML = '<span class="success">登录成功，正在跳转...</span>';
                    
                    // 根据角色跳转不同页面
                    setTimeout(() => {
                        if (result.data.role === 'admin') {
                            window.location.href = 'admin-orders.html';
                        } else {
                            window.location.href = 'dashboard.html';
                        }
                    }, 1000);
                } else {
                    messageDiv.innerHTML = '<span class="error">' + result.message + '</span>';
                }
            } catch (error) {
                console.error('登录错误:', error);
                messageDiv.innerHTML = '<span class="error">网络错误，请确保后端已启动</span>';
            }
        });

        // 注册处理
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const userId = document.getElementById('regUserId').value;
            const name = document.getElementById('regName').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const dormBuilding = document.getElementById('regDormBuilding').value;
            const dormRoom = document.getElementById('regDormRoom').value;
            const phone = document.getElementById('regPhone').value;
            const messageDiv = document.getElementById('registerMessage');
            
            // 清空之前的消息
            messageDiv.innerHTML = '';
            
            // 前端验证
            if (password !== confirmPassword) {
                messageDiv.innerHTML = '<span class="error">两次输入的密码不一致</span>';
                return;
            }
            
            if (password.length < 6) {
                messageDiv.innerHTML = '<span class="error">密码长度不能少于6位</span>';
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: userId,
                        name: name,
                        password: password,
                        dorm_building: dormBuilding,
                        dorm_room: dormRoom,
                        phone: phone
                    })
                });
                
                const result = await response.json();
                
                if (result.code === 200) {
                    messageDiv.innerHTML = '<span class="success">注册成功！3秒后自动跳转到登录页</span>';
                    // 清空表单
                    document.getElementById('registerForm').reset();
                    // 3秒后切换到登录页
                    setTimeout(() => {
                        switchTab('login');
                        messageDiv.innerHTML = '';
                    }, 3000);
                } else {
                    messageDiv.innerHTML = '<span class="error">' + result.message + '</span>';
                }
            } catch (error) {
                console.error('注册错误:', error);
                messageDiv.innerHTML = '<span class="error">网络错误，请确保后端已启动</span>';
            }
        });
    </script>
</body>
</html>
